{% extends "base.html" %}
{% block title %}OIDC Redirect – Home Assistant{% endblock %}
{% block head %}
{{ super() }}
{% endblock %}
{% block body %}
<div class="spinner-page">
    <div role="status">
        <svg
            class="spinner"
            role="progressbar"
            aria-label="Loading"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
        >
            <circle class="spinner-track" />
            <circle class="spinner-indicator" />
        </svg>
        <span class="sr-only">Redirecting...</span>
    </div>
</div>
<script>
    setTimeout(function () {
        window.location.href = decodeURIComponent("{{ url }}");
    }, 0);
</script>
{% endblock %}

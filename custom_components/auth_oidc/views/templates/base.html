<!DOCTYPE html>
<html lang="en">

<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, viewport-fit=cover, initial-scale=1">
    <title>{% block title %}Home Assistant{% endblock %}</title>
    <link rel="icon" href="/static/icons/favicon-192x192.png">
    <link rel="stylesheet" href="/auth/oidc/static/style.css?v=2">
    {% endblock %}
</head>

<body>
    {% block body %}
    <div class="content-wrapper">
        <div class="content-header">
            <img src="/static/icons/favicon-192x192.png" alt="Home Assistant" />
        </div>
        {% block content %}{% endblock %}
    </div>
    {% endblock %}
</body>

</html>
